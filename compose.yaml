services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - 11435:11434
    volumes:
      - ${DOCKER_OLLAMA_DATA:-ollama_data}:/root/.ollama
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - 6333:6333
      - 6334:6334
    volumes:
      - ${DOCKER_QDRANT_DATA:-qdrant_data}:/qdrant/storage

volumes:
  qdrant_data:
  ollama_data:
